{% extends "base.html" %}
{% load static %}

{% block title %}Publicar · Aficiones{% endblock %}

{% block content %}

<h1 class="feed-title">Crear publicación</h1>

<div class="post-card" style="max-width:560px;margin:auto;">
    <form method="post" enctype="multipart/form-data" class="auth-form">
        {% csrf_token %}

        <label for="{{ form.content.id_for_label }}">Contenido</label>
        {{ form.content }}

        <label for="{{ form.image.id_for_label }}" style="margin-top:14px;">Imagen (opcional)</label>
        {{ form.image }}

        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">
            <a href="{% url 'posts:feed' %}" class="btn" style="background:#e2e8f0;color:#0f172a;">Cancelar</a>
            <button type="submit" class="btn btn-primary">Publicar</button>
        </div>
    </form>
</div>

{% endblock %}
