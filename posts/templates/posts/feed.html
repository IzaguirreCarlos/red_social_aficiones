{% extends "base.html" %}
{% load static %}

{% block title %}Muro · Aficiones{% endblock %}

{% block content %}

<h1 class="feed-title">Tu muro</h1>

<div class="feed-container">

    <div id="post-list">
        {% include 'posts/_post_list.html' with posts=posts comment_form=comment_form %}
    </div>

    {% if has_next %}
        <div class="feed-loader" id="feed-loader"
             data-next="{{ next_page }}"
             data-url="{% url 'posts:feed_load_more' %}">
            <button id="load-more-btn" class="btn btn-ghost">Cargar más</button>
        </div>
    {% endif %}

</div>

{% endblock %}
